services:
  - type: web
    name: alpha-agent
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn src.web.app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: "3.13.0"
      - key: AI_PROVIDER
        value: "vertex"
      - key: CONTENT_MODEL
        value: "gemini-2.5-flash"
      - key: VERTEX_LOCATION
        value: "europe-west9"
      - key: RELEVANCE_THRESHOLD
        value: "70"
      - key: SCAN_INTERVAL_MINUTES
        value: "30"
      # --- You must set these manually ---
      - key: VERTEX_PROJECT_ID
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: SQLITE_CLOUD_URL
        sync: false
